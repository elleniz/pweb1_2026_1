<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrícula Curso</title>
</head>
<body>
    <form action="sucesso.html">
    <fieldset>
        <legend><b>Formulário Matrícula de Curso</b></legend>
        <form>
            <label for="pnome">Nome do aluno: </label><br>
            <input type="text" id="pnome" name="pnome" required><br>

            <label for="data">Data de nascimento:</label><br>
            <input type="date" id="data" name="data" required>

            <label for="email" id="email" name="email">E-mail: </label>
            <input type="text" id="email" name="email" required maxlength="10">

            <label for="telefone" id="telefone" name="telefone">Telefone: </label>
            <input type="number" id="telefone" name="telefone" required value="telefone">


            <legend><b>Série:</b></legend>

            <select name="serie" id="serie" required>
                <option value="primeira">1º ano EM</option>
                <option value="segunda">2º ano EM</option>
                <option value="terceira">3º ano EM</option>
                <option value="quarto">4º ano EM</option>
            </select>
            <br>

            <p><b>Turno preferencial:</b></p>
            <input type="radio" id="turno" name="turno-pref" required value="M">
            <label for="turno" id="turno" name="turno">Manhã</label>
            <br>
            <input type="radio" id="turno" name="turno-pref" required value="Tarde">
            <label for="turno" id="turno" name="turno">Tarde</label>
            <br>
            <input type="radio" id="turno" name="turno-pref" required value="N">
            <label for="turno" id="turno" name="turno">Noite</label>

            <legend><b>Atividades extra-curriculares: </b></legend>
            <input type="checkbox" id="teatro" name="teatro">
            <label for="teatro">Teatro</label><br>

            <input type="checkbox" id="musica" name="musica">
            <label for="musica">Música</label><br>
            
            <input type="checkbox" id="ballet" name="ballet">
            <label for="ballet">Ballet</label>

            <input type="checkbox" id="pintura" name="pintura">
            <label for="pintura">Pintura</label><br>

            <input type="checkbox" id="judo" name="judo">
            <label for="judp">Judô</label><br>
            
            <input type="checkbox" id="futebol" name="futebol">
            <label for="futebol">Futebol</label>
            
            <legend><b>Escolha uma unidade mais próximo a você: </b></legend>
            <input list="unidade" name="unidade1" id="unidade1">

            <datalist id="unidade">
                <option value="Chapecó">
                <option value="Xanxerê">
                <option value="Xaxim">
                <option value="Curitiba">
                <option value="Salvador">
                <option value="Londrina">
                <option value="São Paulo">
                <option value="Londres">
                <option value="Brasília">
            </datalist><br><br>

            <input type="submit"> 

            </form>
    </fieldset>
</form>
    
</body>
</html>
