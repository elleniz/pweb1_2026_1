<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrícula Curso</title>
</head>
<body>
    <form action="action_page.html">
    <fieldset>
        <legend><b>Sistema de Gestão Acadêmico</b></legend>
        <form>
            <label for="plogin">Login</label><br>
            <input type="text" id="plogin" name="plogin"><br>
            <label for="senha">Senha:</label><br>
            <input type="text" id="senha" name="senha"><br><br>

            
            <legend><b>Status:</b></legend>

            <select name="status" id="status">
                <option value="ativo">Ativo</option>
                <option value="inativo">inativo</option>
            </select>
            <br>
            <br>

            <p><b>Tipo:</b></p>
            <input type="radio" id="tipo" name="tipo" value="tecnico">
            <label for="tipo" id="tipo" name="tipo">Técnico</label>
            <br>

            <input type="radio" id="tipo" name="tipo" value="tipor">
            <label for="tipo" id="tipo" name="tipo">Professor</label>
            <br>

            <input type="radio" id="tipo" name="tipo" value="professor">
            <label for="tipo" id="tipo" name="tipo">Aluno</label>
            <br>

            <p><b>Data Criação:</b></p>

            <input type="date" id="data" name="data" value="data">

            <br>
            <br>

            <p><b>Perfil:</b></p>
            <input type="radio" id="perfil" name="perfil" value="tecnico">
            <label for="perfil" id="perfil" name="perfil">Técnico</label>

            <input type="radio" id="perfil" name="perfil" value="adm">
            <label for="perfil" id="perfil" name="perfil">Administrador</label>
            <br><br>
            
            <p><b>Observações: </b></p>
            <textarea id="obs" name="obs" rows="8" cols="50">
                
            </textarea>

            <p><b>Módulos: </b></p>
            <input type="checkbox" id="compras" name="compras">
            <label for="compras">Compras</label>
            
            <input type="checkbox" id="biblioteca" name="biblioteca">
            <label for="biblioteca">Biblioteca</label>

            <input type="checkbox" id="academico" name="academico">
            <label for="academico">Acadêmico</label>            
            <br>
            
            
            <input type="checkbox" id="documentacao" name="documentacao">
            <label for="documentacao">Documentação</label>

            <input type="checkbox" id="rh" name="rh">
            <label for="rh">Recursos Humanos</label>            
            <br>
            <br>

            <input type="submit" name="save" value="Salvar"> 
            <input type="submit" name="delete" value="Excluir"> 

            </form>
    </fieldset>
</form>
    
</body>
</html>
