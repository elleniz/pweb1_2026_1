<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrícula Curso</title>
</head>
<body>
    <form action="action_page.html">
    <fieldset>
        <legend><b>Formulário Matrícula de Curso</b></legend>
        <form>
            <label for="pnome">Primeiro nome:</label><br>
            <input type="text" id="pnome" name="pnome"><br>
            <label for="unome">Sobrenome:</label><br>
            <input type="text" id="unome" name="unome">
            <p><b>Curso:</b></p>
            <input type="radio" id="curso" name="meu-curso" value="ti">
            <label for="curso" id="curso" name="curso">Técnico em informática</label>
            <br>
            <input type="radio" id="curso" name="meu-curso" value="ads">
            <label for="curso" id="curso" name="curso">Graduação - Análise e Desenvolvimento de Sistemas</label>
            <br>
            <input type="radio" id="curso" name="meu-curso" value="pw">
            <label for="curso" id="curso" name="curso">Profissionalizante - Programação Web</label>

            <br>
            <br>
            <legend><b>Linguagens de programação de sua preferência: </b></legend>
            <input type="checkbox" id="php" name="php">
            <label for="php">PHP</label><br>

            <input type="checkbox" id="java" name="java">
            <label for="php">Java</label><br>
            
            <input type="checkbox" id="python" name="python">
            <label for="php">Python</label>
            
            <br>
            <br>

            <legend><b>Escolha um turno:</b></legend>

            <select name="turno" id="turno">
                <option value="Manhã">Manhã</option>
                <option value="Tarde">Tarde</option>
                <option value="Noite">Noite</option>
            </select>
            <br>
            <br>

            <legend><b>Escolha uma unidade mais próximo a você: </b></legend>
            <input list="unidade" name="unidade1" id="unidade1">

            <datalist id="unidade">
                <option value="Chapecó">
                <option value="Xanxerê">
                <option value="Xaxim">
                <option value="Curitiba">
                <option value="Salvador">
                <option value="Londrina">
                <option value="São Paulo">
                <option value="Londres">
                <option value="Brasília">
            </datalist><br><br>

            <input type="submit"> 

            </form>
    </fieldset>
</form>
    
</body>
</html>
